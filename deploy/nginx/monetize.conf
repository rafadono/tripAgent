server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html/static;
  index landing.html;

  location = / {
    try_files /landing.html =404;
  }

  location /app/ {
    return 302 /index.html;
  }

  # Proxy API endpoints to the FastAPI backend
  location ~ ^/(plan|auth|search_places|nearest_parking|ui-check|health|docs|openapi.json) {
    proxy_pass http://tripagent:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Serve other static files directly
  location / {
    try_files $uri $uri/ /landing.html;
  }
}
