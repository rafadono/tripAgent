name: tripAgent CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install Dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system pytest ruff

      - name: Lint Code (ruff)
        run: |
          ruff check .

      - name: Run Tests
        env:
          GOOGLE_MAPS_API_KEY: "dummy_key_for_testing_purposes"
          REDIS_HOST: "localhost"
          REDIS_PORT: 6379
        run: |
          python -m unittest discover -s tests -p "test_*.py"
